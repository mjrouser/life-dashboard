<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --text: #1a1a18;
    --text-secondary: #6e6e68;
    --text-tertiary: #a3a39d;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.15);
    --accent: #1d6b54;
    --accent-bg: #e8f4ef;
    --energy-high: #1d6b54;
    --energy-medium: #a07b28;
    --energy-low: #7a7a74;
    --deadline-accent: #b85c2f;
    --deadline-bg: #fdf2ec;
    --shipped-gold: #a07b28;
    --shipped-bg: #faf5e8;
    --pill-active-bg: #1a1a18;
    --pill-active-text: #fafaf8;
    --today-bg: #f0f7f4;
    --today-border: #c5e0d3;
    --font: 'IBM Plex Sans', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1e1c;
      --text: #e8e8e4;
      --text-secondary: #9a9a94;
      --text-tertiary: #6a6a64;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --accent: #5dcaa5;
      --accent-bg: #0f2e23;
      --energy-high: #5dcaa5;
      --energy-medium: #e0b44a;
      --energy-low: #7a7a74;
      --deadline-accent: #e0874a;
      --deadline-bg: #2a1c12;
      --shipped-gold: #e0b44a;
      --shipped-bg: #2a2210;
      --pill-active-bg: #e8e8e4;
      --pill-active-text: #141413;
      --today-bg: #122a20;
      --today-border: #1d5040;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  .outer-wrapper {
    max-width: 880px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    display: grid;
    grid-template-columns: 1fr 220px;
    gap: 24px;
  }

  @media (max-width: 720px) {
    .outer-wrapper {
      grid-template-columns: 1fr;
      gap: 2rem;
    }
  }

  .container {
    min-width: 0;
  }

  /* Header */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 0.5px solid var(--border);
  }
  header h1 {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  header time {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-tertiary);
  }

  /* Filter pills */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.75rem;
    align-items: center;
  }
  .filter-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
    margin-right: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .pill {
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s ease;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--border-hover); color: var(--text); }
  .pill.active {
    background: var(--pill-active-bg);
    color: var(--pill-active-text);
    border-color: var(--pill-active-bg);
  }

  /* Today strip */
  .today-strip {
    background: var(--today-bg);
    border: 0.5px solid var(--today-border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 2rem;
  }
  .today-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .today-item {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 0;
    font-size: 14px;
  }
  .today-item .project-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
    flex-shrink: 0;
    margin-left: auto;
  }
  .today-item .step {
    color: var(--text);
    font-weight: 500;
  }
  .today-empty {
    font-size: 13px;
    color: var(--text-tertiary);
    font-style: italic;
  }

  /* Pick Up Here Card */
  .pickup-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 2rem;
  }
  .pickup-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 8px;
  }
  .pickup-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
  }
  .pickup-project {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }
  .pickup-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .pickup-touched {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
    margin-bottom: 10px;
  }
  .pickup-next {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .pickup-next strong {
    color: var(--text);
    font-weight: 500;
  }
  .pickup-question {
    font-size: 13px;
    color: var(--text-secondary);
    font-style: italic;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
  }
  .pickup-question strong {
    font-style: normal;
    color: var(--text-tertiary);
    font-weight: normal;
  }

  /* Sections */
  .section {
    margin-bottom: 2rem;
  }
  .section-header {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-tertiary);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-header .count {
    font-size: 10px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 8px;
    color: var(--text-secondary);
  }
  .section.deadline .section-header { color: var(--deadline-accent); border-bottom-color: var(--deadline-accent); opacity: 0.7; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    margin-bottom: 8px;
    transition: border-color 0.12s ease;
  }
  .card:hover { border-color: var(--border-hover); }
  .card.deadline { border-left: 3px solid var(--deadline-accent); border-radius: 2px 10px 10px 2px; }

  .card-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 8px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    min-width: 0;
  }
  .card-project {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
    flex-shrink: 0;
  }

  .card-next {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .card-next strong {
    color: var(--text);
    font-weight: 500;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .card-breadcrumb {
    font-size: 12px;
    color: var(--text-tertiary);
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-deadline-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--deadline-accent);
    background: var(--deadline-bg);
    padding: 2px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .energy-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .energy-dot.high { background: var(--energy-high); }
  .energy-dot.medium { background: var(--energy-medium); }
  .energy-dot.low { background: var(--energy-low); }

  /* Shipped Sidebar */
  .shipped-sidebar {
    border-left: 0.5px solid var(--border);
    padding-left: 24px;
    position: sticky;
    top: 2rem;
    align-self: start;
  }
  .shipped-sidebar-header {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--shipped-gold);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .shipped-sidebar-header svg {
    width: 14px;
    height: 14px;
  }

  .shipped-item {
    padding-bottom: 14px;
    margin-bottom: 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .shipped-item:last-child {
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }

  .shipped-badge {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 12px 4px 8px;
    border-radius: 20px;
    white-space: nowrap;
    font-family: var(--mono);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: var(--shipped-gold);
    border: 2px solid var(--shipped-gold);
    margin-bottom: 6px;
  }
  .shipped-badge svg {
    width: 16px;
    height: 16px;
  }
  .shipped-badge.triple {
    border-width: 3px;
  }

  .shipped-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .shipped-project {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-tertiary);
  }

  /* Celebration animation */
  @keyframes ship-in {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes trophy-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  @media (prefers-reduced-motion: no-preference) {
    .ship-celebrate {
      animation: ship-in 0.4s ease-out both;
    }
    .ship-celebrate .shipped-badge {
      animation: trophy-bounce 0.5s ease-in-out 0.4s both;
    }
  }

  /* Empty state */
  .empty-message {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-tertiary);
    font-size: 14px;
  }

  /* Energy legend */
  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-bottom: 1.75rem;
    padding: 8px 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-tertiary);
  }

  /* Responsive: sidebar below main on mobile */
  @media (max-width: 720px) {
    .shipped-sidebar {
      border-left: none;
      padding-left: 0;
      position: static;
      margin-top: 2rem;
    }
  }
</style>
</head>
<body>
<div class="outer-wrapper">
  <div class="container" id="app"></div>
  <aside class="shipped-sidebar" id="shipped-sidebar"></aside>
</div>

<script>
const SECTIONS = [
  { key: 'active-deadline', label: 'Active — deadline', className: 'deadline' },
  { key: 'active-in-progress', label: 'Active — in progress', className: '' },
  { key: 'live-has-tail', label: 'Live — has a tail', className: '' },
  { key: 'ready', label: 'Ready to pick up', className: '' },
  { key: 'parked', label: 'Parked', className: '' },
  { key: 'queued', label: 'Queued', className: '' }
];

let data = null;
let activeFilter = null;
let celebratedItems = new Set();

async function init() {
  try {
    const resp = await fetch('dashboard-data.json');
    data = await resp.json();
  } catch (e) {
    document.getElementById('app').innerHTML = '<p class="empty-message">Could not load dashboard-data.json</p>';
    return;
  }
  render();
  setupCelebrations();
}

function projectShort(id) {
  const p = data.projects.find(p => p.id === id);
  return p ? p.name : id;
}

function formatDeadline(d) {
  const date = new Date(d + 'T00:00:00');
  const now = new Date();
  const diff = Math.ceil((date - now) / (1000 * 60 * 60 * 24));
  const label = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (diff < 0) return `${label} (overdue)`;
  if (diff <= 7) return `${label} (${diff}d)`;
  return label;
}

function formatUpdated(dateStr) {
  const date = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  const diff = Math.floor((now - date) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'today';
  if (diff === 1) return 'yesterday';
  return `${diff}d ago`;
}

function filteredChats() {
  let chats = data.chats;
  if (activeFilter) {
    chats = chats.filter(c => c.project_id === activeFilter);
  }
  return chats;
}

function getMostRecentChat() {
  const chats = filteredChats().filter(c => c.status !== 'shipped');
  if (chats.length === 0) return null;
  return chats.reduce((latest, current) =>
    new Date(current.updated) > new Date(latest.updated) ? current : latest
  );
}

function trophySvg() {
  return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M8 21h8M12 17v4M7 4H4a1 1 0 0 0-1 1v2a4 4 0 0 0 4 4h1M17 4h3a1 1 0 0 1 1 1v2a4 4 0 0 1-4 4h-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M7 4h10v7a5 5 0 0 1-10 0V4Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

function render() {
  const chats = filteredChats();
  const shipped = chats.filter(c => c.status === 'shipped');
  const todayChats = data.today
    .map(t => data.chats.find(c => c.id === t.chat_id))
    .filter(c => c && (!activeFilter || c.project_id === activeFilter));

  let html = '';

  // Header
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
  html += `<header><h1>Dashboard</h1><time>${dateStr}</time></header>`;

  // Filter pills
  html += '<div class="filters"><span class="filter-label">Filter</span>';
  html += `<button class="pill ${!activeFilter ? 'active' : ''}" onclick="setFilter(null)">All</button>`;
  data.projects.forEach(p => {
    html += `<button class="pill ${activeFilter === p.id ? 'active' : ''}" onclick="setFilter('${p.id}')">${p.emoji} ${p.name}</button>`;
  });
  html += '</div>';

  // Energy legend
  html += `<div class="legend">
    <span class="legend-item">Energy needed:</span>
    <span class="legend-item"><span class="energy-dot high"></span> high</span>
    <span class="legend-item"><span class="energy-dot medium"></span> medium</span>
    <span class="legend-item"><span class="energy-dot low"></span> low</span>
  </div>`;

  // Today strip
  html += '<div class="today-strip"><div class="today-label">Pickable today</div>';
  if (todayChats.length === 0) {
    html += '<div class="today-empty">Nothing queued — permission to rest.</div>';
  } else {
    todayChats.forEach(c => {
      html += `<div class="today-item">
        <span class="energy-dot ${c.energy || 'low'}"></span>
        <span class="step">${esc(c.next_step)}</span>
        <span class="project-tag">${projectShort(c.project_id)}</span>
      </div>`;
    });
  }
  html += '</div>';

  // Pick Up Here card
  const mostRecent = getMostRecentChat();
  if (mostRecent && mostRecent.next_step) {
    html += '<div class="pickup-card">';
    html += '<div class="pickup-header">';
    html += '<span class="pickup-label">Pick up where you left off</span>';
    html += `<span class="pickup-project">${projectShort(mostRecent.project_id)}</span>`;
    html += '</div>';
    html += `<div class="pickup-title">${esc(mostRecent.title)}</div>`;
    html += `<div class="pickup-touched">last touched ${formatUpdated(mostRecent.updated)}</div>`;
    html += `<div class="pickup-next"><strong>Next:</strong> ${esc(mostRecent.next_step)}</div>`;
    if (mostRecent.open_question) {
      html += `<div class="pickup-question"><strong>Open question:</strong> ${esc(mostRecent.open_question)}</div>`;
    }
    html += '</div>';
  }

  // Status sections
  SECTIONS.forEach(sec => {
    const items = chats.filter(c => c.status === sec.key);
    if (items.length === 0) return;

    html += `<div class="section ${sec.className}">`;
    html += `<div class="section-header">${sec.label}<span class="count">${items.length}</span></div>`;

    items.forEach(c => {
      const isDeadline = sec.key === 'active-deadline';
      html += `<div class="card ${isDeadline ? 'deadline' : ''}">`;
      html += `<div class="card-top">
        <span class="card-title">${esc(c.title)}</span>
        <span class="card-project">${projectShort(c.project_id)}</span>
      </div>`;
      if (c.next_step) {
        html += `<div class="card-next"><strong>Next:</strong> ${esc(c.next_step)}</div>`;
      }
      html += '<div class="card-meta">';
      if (c.energy) html += `<span class="energy-dot ${c.energy}"></span>`;
      if (c.breadcrumb) html += `<span class="card-breadcrumb">${esc(c.breadcrumb)}</span>`;
      if (isDeadline && c.deadline) html += `<span class="card-deadline-tag">${formatDeadline(c.deadline)}</span>`;
      html += '</div></div>';
    });

    html += '</div>';
  });

  // Empty state
  if (chats.filter(c => c.status !== 'shipped').length === 0 && shipped.length === 0) {
    html += '<div class="empty-message">No items to show.</div>';
  }

  document.getElementById('app').innerHTML = html;

  // Render shipped sidebar
  renderShippedSidebar(shipped);
}

function renderShippedSidebar(shipped) {
  const sidebar = document.getElementById('shipped-sidebar');

  if (shipped.length === 0) {
    sidebar.innerHTML = '';
    return;
  }

  let html = `<div class="shipped-sidebar-header">${trophySvg()} Shipped</div>`;

  shipped.forEach(c => {
    const cnt = c.shipped_count || 1;
    const animate = !c.celebrated && !celebratedItems.has(c.id);
    html += `<div class="shipped-item ${animate ? 'ship-celebrate' : ''}">`;
    html += `<div class="shipped-badge ${cnt >= 3 ? 'triple' : ''}">
      ${trophySvg()}
      <span>shipped${cnt >= 3 ? ' ×' + cnt : ''}</span>
    </div>`;
    html += `<div class="shipped-title">${esc(c.title)}</div>`;
    html += `<div class="shipped-project">${projectShort(c.project_id)}</div>`;
    html += '</div>';
  });

  sidebar.innerHTML = html;
}

function setupCelebrations() {
  const shipped = data.chats.filter(c => c.status === 'shipped');
  shipped.forEach(c => {
    if (!c.celebrated) {
      celebratedItems.add(c.id);
    }
  });
}

function setFilter(id) {
  activeFilter = activeFilter === id ? null : id;
  render();
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

init();
</script>
</body>
</html>
